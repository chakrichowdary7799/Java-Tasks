version: '3.8'

services:
  # Central Relational Database Cluster Engine
  mysql:
    image: mysql:8.0
    container_name: enterprise-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Chakri@7799
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - enterprise-network

  # Kafka Coordination Cluster Service
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: enterprise-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - enterprise-network

  # Asynchronous Event Broker Topology Engine
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: enterprise-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - enterprise-network

volumes:
  mysql_data:

networks:
  enterprise-network:
    driver: bridge
